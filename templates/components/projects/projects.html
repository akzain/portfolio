{% load static %}
<link rel="stylesheet" href="{% static 'css/projects/index.css' %}">
<div class="container">
    {% for project in projects|slice:":3" %}
    <div class="projects_container">
            {{ project.title }}
            <br>
            <img src="{{ project.image.url }}">
        <div class="layer">
            <a class="btn btn-white btn-mid" href="{% url 'single_project' project.id %}">View></a>
        </div>
    </div>
    {% endfor %}
</div>
